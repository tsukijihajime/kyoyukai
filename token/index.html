<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>トークン体験 ― 生成AIなんでも共有会</title>
<style>
  :root{
    --bg:#0f172a; --card:#1e293b; --card2:#273449;
    --ink:#f1f5f9; --sub:#94a3b8; --line:#334155;
    --blue:#38bdf8; --indigo:#818cf8; --warm:#fb7185; --amber:#fbbf24; --gray:#64748b;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:
      radial-gradient(900px 500px at 50% -10%,#1e3a5f 0,transparent 60%),var(--bg);
    color:var(--ink);
    font-family:'Hiragino Kaku Gothic ProN','Yu Gothic UI',Meiryo,system-ui,-apple-system,sans-serif;
    line-height:1.7;padding:18px 16px 40px;}
  .wrap{max-width:680px;margin:0 auto}
  header{text-align:center;margin-bottom:18px}
  .badge{display:inline-block;font-size:.72rem;letter-spacing:.12em;color:#0f172a;background:var(--blue);
    border-radius:999px;padding:.3em 1em;font-weight:800;margin-bottom:12px}
  h1{font-size:1.6rem;margin:.1em 0 .25em;font-weight:800;letter-spacing:.01em}
  h1 .em{background:linear-gradient(90deg,var(--blue),var(--indigo));-webkit-background-clip:text;background-clip:text;color:transparent}
  .lead{color:var(--sub);font-size:.95rem;margin:0}

  .panel{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:16px}
  label.k{display:block;font-size:.8rem;color:var(--sub);font-weight:700;margin-bottom:8px}
  textarea{width:100%;min-height:96px;resize:vertical;border-radius:12px;border:1px solid var(--line);
    background:#0b1220;color:var(--ink);padding:14px;font-size:1.1rem;font-family:inherit;line-height:1.7}
  textarea:focus{outline:2px solid var(--blue);border-color:transparent}

  .stats{display:flex;gap:10px;margin-top:14px}
  .stat{flex:1;background:#0b1220;border:1px solid var(--line);border-radius:12px;padding:10px 6px;text-align:center}
  .stat .v{font-size:1.7rem;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
  .stat .v.tk{color:var(--indigo)} .stat .v.rt{color:var(--amber)}
  .stat .l{font-size:.7rem;color:var(--sub);margin-top:5px}

  .chips{margin-top:14px;display:flex;flex-wrap:wrap;gap:5px;min-height:44px;align-content:flex-start}
  .chip{padding:.25em .5em;border-radius:7px;font-weight:700;font-size:1rem;border:1px solid transparent;
    animation:pop .18s ease}
  .chip.cjk{background:rgba(251,113,133,.16);color:#fda4af;border-color:rgba(251,113,133,.4)}
  .chip.word{background:rgba(56,189,248,.16);color:#7dd3fc;border-color:rgba(56,189,248,.4)}
  .chip.pun{background:rgba(100,116,139,.2);color:#cbd5e1;border-color:rgba(100,116,139,.4)}
  @keyframes pop{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px;font-size:.78rem;color:var(--sub)}
  .legend i{display:inline-block;width:.8em;height:.8em;border-radius:3px;margin-right:.35em;vertical-align:-1px}

  .presets{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
  .presets button{cursor:pointer;border:1px solid var(--line);background:var(--card2);color:var(--ink);
    border-radius:999px;padding:.45em 1em;font-size:.85rem;font-family:inherit}
  .presets button:active{transform:scale(.96);border-color:var(--blue)}

  .cmp h2{font-size:1.05rem;margin:0 0 4px;font-weight:800}
  .cmp .note{font-size:.82rem;color:var(--sub);margin:0 0 14px}
  .cmp .note .st{color:var(--amber);font-weight:700}
  .row{margin-bottom:14px}
  .row .top{display:flex;justify-content:space-between;align-items:baseline;font-size:.9rem;margin-bottom:5px;gap:8px}
  .row .lbl{font-weight:700}
  .row .lbl .flag{font-size:.95rem;margin-right:.3em}
  .row .num{color:var(--sub);font-variant-numeric:tabular-nums;white-space:nowrap}
  .track{height:16px;background:#0b1220;border-radius:999px;overflow:hidden}
  .fill{height:100%;border-radius:999px;width:0;transition:width .5s ease}
  .fill.jp{background:linear-gradient(90deg,var(--warm),var(--amber))}
  .fill.en{background:linear-gradient(90deg,var(--blue),var(--indigo))}
  .ttext{font-size:.85rem;color:var(--ink);margin-top:5px;background:#0b1220;border:1px solid var(--line);
    border-radius:8px;padding:6px 10px;word-break:break-word}
  .verdict{text-align:center;font-weight:800;background:var(--card2);border:1px solid var(--line);
    border-radius:12px;padding:10px;margin-top:6px}
  .verdict .x{color:var(--warm);font-size:1.2rem}
  .extnote{font-size:.72rem;color:var(--sub);margin:12px 0 0;line-height:1.5}

  footer{text-align:center;color:var(--sub);font-size:.78rem;margin-top:8px;line-height:1.6}
</style>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2NCA2NCI+PHJlY3Qgd2lkdGg9IjY0IiBoZWlnaHQ9IjY0IiByeD0iMTQiIGZpbGw9IiMxZTI5M2IiLz48cmVjdCB4PSIxMSIgeT0iMjYiIHdpZHRoPSIxOCIgaGVpZ2h0PSIxMiIgcng9IjMiIGZpbGw9IiMzOGJkZjgiLz48cmVjdCB4PSIzNSIgeT0iMjYiIHdpZHRoPSIxOCIgaGVpZ2h0PSIxMiIgcng9IjMiIGZpbGw9IiM4MThjZjgiLz48L3N2Zz4=">
</head>
<body>
<div class="wrap">
  <header>
    <span class="badge">生成AIなんでも共有会</span>
    <h1><span class="em">トークン</span>体験</h1>
    <p class="lead">文字を打つと、AIの読む単位「トークン」に割れます。<br>自動で英↔日に翻訳して、ブロックの数をくらべます。</p>
  </header>

  <div class="panel">
    <label class="k" for="ta">▼ ここに自由に打ってみる（日本語でも英語でもOK）</label>
    <textarea id="ta" placeholder="例：今日はとても良い天気です。 / It is very nice weather today.">今日はとても良い天気です。</textarea>
    <div class="stats">
      <div class="stat"><div class="v" id="chars">0</div><div class="l">文字数</div></div>
      <div class="stat"><div class="v tk" id="tokens">0</div><div class="l">トークン（目安）</div></div>
      <div class="stat"><div class="v rt" id="ratio">―</div><div class="l">1トークンの文字数</div></div>
    </div>
    <div class="chips" id="chips" aria-live="polite"></div>
    <div class="legend">
      <span><i style="background:#fb7185"></i>日本語（重め）</span>
      <span><i style="background:#38bdf8"></i>英数字（軽め）</span>
      <span><i style="background:#64748b"></i>記号・その他</span>
    </div>
    <div style="margin-top:14px">
      <label class="k">試してみる ↓</label>
      <div class="presets" id="presets">
        <button data-t="今日はとても良い天気です。">今日は〜（日本語）</button>
        <button data-t="It is very nice weather today.">It is...（英語）</button>
        <button data-t="議事録を3行で要約してください。">議事録を要約（日本語）</button>
        <button data-t="生成AIなんでも共有会">会の名前で試す</button>
      </div>
    </div>
  </div>

  <div class="panel cmp">
    <h2>日本語 ⇄ 英語で比べる</h2>
    <p class="note">上に打った文を自動で翻訳して、トークン数を比べます。<span class="st" id="cmpStatus"></span></p>
    <div id="cmpBody" style="display:none">
      <div class="row">
        <div class="top"><span class="lbl" id="srcLbl"></span><span class="num" id="srcNum"></span></div>
        <div class="track"><div class="fill" id="srcBar"></div></div>
        <div class="ttext" id="srcText"></div>
      </div>
      <div class="row">
        <div class="top"><span class="lbl" id="trLbl"></span><span class="num" id="trNum"></span></div>
        <div class="track"><div class="fill" id="trBar"></div></div>
        <div class="ttext" id="trText"></div>
      </div>
      <div class="verdict" id="verdict"></div>
    </div>
    <p class="extnote">※ 翻訳は無料の外部サービス(MyMemory)を利用しています。打った文がそのサービスへ送信されるため、機密情報は入力しないでください。ネット接続が必要です。トークン数・翻訳は理解のための目安です。</p>
  </div>

  <footer>
    生成AIなんでも共有会 ・ スマホでもPCでもOK
  </footer>
</div>

<script>
(function(){
  var ta=document.getElementById('ta');
  var cEl=document.getElementById('chars'),tEl=document.getElementById('tokens'),
      rEl=document.getElementById('ratio'),chipsEl=document.getElementById('chips');

  function isCJK(c){var u=c.codePointAt(0);
    return (u>=0x3040&&u<=0x30ff)||(u>=0x3400&&u<=0x9fff)||(u>=0xff66&&u<=0xff9f)||(u>=0xf900&&u<=0xfaff);}
  function isWord(c){return /[A-Za-z0-9]/.test(c);}

  function tokenize(text){
    var chips=[],chars=Array.from(text),i=0;
    while(i<chars.length){
      var c=chars[i];
      if(c===' '||c==='\n'||c==='\t'||c==='　'){i++;continue;}
      if(isCJK(c)){chips.push({t:c,k:'cjk'});i++;continue;}
      if(isWord(c)){
        var w='',j=i;
        while(j<chars.length&&isWord(chars[j])){w+=chars[j];j++;}
        for(var p=0;p<w.length;p+=4){chips.push({t:w.slice(p,p+4),k:'word'});}
        i=j;continue;
      }
      chips.push({t:c,k:'pun'});i++;
    }
    return chips;
  }
  function countTokens(text){return tokenize(text).length;}

  function render(){
    var text=ta.value;
    var chips=tokenize(text);
    var charN=Array.from(text.replace(/\s/g,'')).length;
    cEl.textContent=charN.toLocaleString();
    tEl.textContent=chips.length.toLocaleString();
    rEl.textContent=chips.length?(charN/chips.length).toFixed(1):'―';
    chipsEl.innerHTML='';
    var frag=document.createDocumentFragment();
    chips.forEach(function(ch){
      var s=document.createElement('span');
      s.className='chip '+ch.k;s.textContent=ch.t;frag.appendChild(s);
    });
    chipsEl.appendChild(frag);
  }

  // ===== 自動翻訳して日英比較 =====
  var statusEl=document.getElementById('cmpStatus'),bodyEl=document.getElementById('cmpBody'),
      srcLbl=document.getElementById('srcLbl'),srcNum=document.getElementById('srcNum'),
      srcBar=document.getElementById('srcBar'),srcText=document.getElementById('srcText'),
      trLbl=document.getElementById('trLbl'),trNum=document.getElementById('trNum'),
      trBar=document.getElementById('trBar'),trText=document.getElementById('trText'),
      verdict=document.getElementById('verdict');
  var timer=null, lastReq='';

  function detectLang(t){return /[぀-ヿ㐀-鿿ｦ-ﾟ]/.test(t)?'ja':'en';}
  function meta(lang){return lang==='ja'?{flag:'🇯🇵',name:'日本語',cls:'jp'}:{flag:'🇬🇧',name:'英語',cls:'en'};}

  function schedule(){clearTimeout(timer);timer=setTimeout(translate,700);}

  function translate(){
    var text=ta.value.trim();
    if(!text){bodyEl.style.display='none';statusEl.textContent='';return;}
    var from=detectLang(text),to=(from==='ja')?'en':'ja';
    statusEl.textContent='翻訳中…';
    lastReq=text;
    var url='https://api.mymemory.translated.net/get?q='+encodeURIComponent(text)+'&langpair='+from+'|'+to;
    fetch(url).then(function(r){return r.json();}).then(function(d){
      if(text!==lastReq) return; // 古い結果は破棄
      var tr=d&&d.responseData&&d.responseData.translatedText;
      if(!tr) throw new Error('no translation');
      show(from,text,to,tr);
    }).catch(function(){
      if(text!==lastReq) return;
      statusEl.textContent='翻訳できませんでした（ネット接続が必要です）';
      bodyEl.style.display='none';
    });
  }

  function show(fromLang,srcTxt,toLang,trTxt){
    statusEl.textContent='';
    var fm=meta(fromLang),tm=meta(toLang);
    var sN=countTokens(srcTxt),tN=countTokens(trTxt);
    var max=Math.max(sN,tN,1);
    srcLbl.innerHTML='<span class="flag">'+fm.flag+'</span>'+fm.name+'（入力）';
    trLbl.innerHTML='<span class="flag">'+tm.flag+'</span>'+tm.name+'（翻訳）';
    srcNum.textContent='約'+sN+'トークン';
    trNum.textContent='約'+tN+'トークン';
    srcBar.className='fill '+fm.cls; trBar.className='fill '+tm.cls;
    srcBar.style.width=Math.round(sN/max*100)+'%';
    trBar.style.width=Math.round(tN/max*100)+'%';
    srcText.textContent=srcTxt; trText.textContent=trTxt;
    // 日本語と英語のどちらが重いか
    var jaN=(fromLang==='ja')?sN:tN, enN=(fromLang==='ja')?tN:sN;
    if(enN>0&&jaN>0){
      var ratio=(jaN/enN);
      if(ratio>=1.05) verdict.innerHTML='日本語は英語の <span class="x">約'+ratio.toFixed(1)+'倍</span> のトークン';
      else if(ratio<=0.95) verdict.innerHTML='この文では英語の方が <span class="x">約'+(1/ratio).toFixed(1)+'倍</span> 重い';
      else verdict.innerHTML='この文ではほぼ同じトークン数';
    } else verdict.textContent='';
    bodyEl.style.display='';
  }

  ta.addEventListener('input',function(){render();schedule();});
  document.getElementById('presets').addEventListener('click',function(e){
    var b=e.target.closest('button');if(!b)return;
    ta.value=b.getAttribute('data-t');render();schedule();ta.focus();
  });

  render();
  translate();
})();
</script>
</body>
</html>
