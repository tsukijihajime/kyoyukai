<!DOCTYPE html>
<html lang="ja">
<!--
  ===== 生成AIなんでも共有会・Web体験ハブ（トップページ）=====
  ▼ 体験を1つ増やす手順
   1. 新しいフォルダを作る（例：next-token/）。中に index.html を置く（自己完結HTML推奨）
   2. 下の <a class="card"> ... </a> を1つコピーして、href とタイトル・説明を変える
   3. git add → commit → push すれば数十秒で反映
-->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生成AIなんでも共有会 ― Web体験ハブ</title>
<style>
  :root{
    --bg:#0f172a; --card:#1e293b; --card2:#273449;
    --ink:#f1f5f9; --sub:#94a3b8; --line:#334155;
    --blue:#38bdf8; --indigo:#818cf8; --warm:#fb7185; --amber:#fbbf24;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:
      radial-gradient(900px 500px at 50% -10%,#1e3a5f 0,transparent 60%),var(--bg);
    color:var(--ink);
    font-family:'Hiragino Kaku Gothic ProN','Yu Gothic UI',Meiryo,system-ui,-apple-system,sans-serif;
    line-height:1.7;padding:24px 16px 48px;}
  .wrap{max-width:720px;margin:0 auto}
  header{text-align:center;margin-bottom:26px}
  .badge{display:inline-block;font-size:.72rem;letter-spacing:.12em;color:#0f172a;background:var(--blue);
    border-radius:999px;padding:.3em 1em;font-weight:800;margin-bottom:14px}
  h1{font-size:1.7rem;margin:.1em 0 .3em;font-weight:800;letter-spacing:.01em}
  h1 .em{background:linear-gradient(90deg,var(--blue),var(--indigo));-webkit-background-clip:text;background-clip:text;color:transparent}
  .lead{color:var(--sub);font-size:.95rem;margin:0}

  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}
  .card{display:flex;flex-direction:column;gap:6px;text-decoration:none;color:inherit;
    background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px 18px 16px;
    transition:transform .12s ease,border-color .12s ease}
  .card:hover{transform:translateY(-3px);border-color:var(--blue)}
  .card .ico{font-size:2rem;line-height:1}
  .card .ttl{font-size:1.15rem;font-weight:800;margin-top:4px}
  .card .desc{font-size:.86rem;color:var(--sub);flex-grow:1}
  .card .go{font-size:.85rem;font-weight:700;color:var(--blue);margin-top:6px}
  .tag{align-self:flex-start;font-size:.66rem;font-weight:800;letter-spacing:.08em;border-radius:999px;
    padding:.2em .7em}
  .tag.live{background:rgba(56,189,248,.16);color:#7dd3fc}
  .tag.soon{background:rgba(148,163,184,.16);color:#cbd5e1}
  .card.soon{opacity:.55;cursor:default}
  .card.soon:hover{transform:none;border-color:var(--line)}

  footer{text-align:center;color:var(--sub);font-size:.78rem;margin-top:30px;line-height:1.7}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="badge">生成AIなんでも共有会</span>
    <h1><span class="em">Web体験</span>ハブ</h1>
    <p class="lead">気になるものをタップして、その場で触ってみよう。<br>毎月、新しい体験がふえていきます。</p>
  </header>

  <div class="grid">

    <!-- ▼ 体験カード（コピーして増やせる） -->
    <a class="card" href="token/">
      <span class="tag live">公開中</span>
      <div class="ico">🧩</div>
      <div class="ttl">トークン体験</div>
      <div class="desc">文字を打つと、AIの読む単位「トークン」に割れる様子を体感。日本語と英語のちがいもくらべられる。</div>
      <div class="go">ひらく →</div>
    </a>

    <!-- 追加予定（プレースホルダ。新しい体験ができたら live カードに差し替え） -->
    <div class="card soon">
      <span class="tag soon">近日</span>
      <div class="ico">✨</div>
      <div class="ttl">次の体験</div>
      <div class="desc">毎月の共有会にあわせて追加していきます。</div>
      <div class="go">準備中</div>
    </div>

  </div>

  <footer>
    生成AIなんでも共有会 ・ スマホでもPCでもOK<br>
    各体験の数値は理解のための目安です。
  </footer>
</div>
</body>
</html>
